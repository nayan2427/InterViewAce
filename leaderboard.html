<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - InterviewAce</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body data-page="leaderboard">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <picture>
          <source srcset="images/logo.webp 1x, images/logo-2x.webp 2x" type="image/webp">
          <img src="images/logo.png" alt="InterviewAce" width="36" height="24">
        </picture>
        <span>InterviewAce</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="mcq.html"><span class="nav-icon">📝</span> MCQ Test</a>
        <a href="notes.html"><span class="nav-icon">📒</span> Notes</a>
        <a href="leaderboard.html" class="active"><span class="nav-icon">🏆</span> Leaderboard</a>
        <a href="profile.html"><span class="nav-icon">👤</span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button class="dark-mode-toggle btn btn-outline" style="width:100%">🌙 Dark</button>
        <button id="logoutBtn" class="btn btn-danger" style="width:100%">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>🏆 Leaderboard</h1>
          <p>Top performers ranked by highest score</p>
        </div>
        <picture>
          <source srcset="images/trophy.webp 1x, images/trophy-2x.webp 2x" type="image/webp">
          <img src="images/trophy.png" alt="Trophy" style="width:48px;" width="48" height="32">
        </picture>
      </header>

      <!-- Top 3 Podium -->
      <section id="topThree" class="top-three">
        <!-- Populated by JS -->
      </section>

      <!-- Full Rankings Table -->
      <section class="card">
        <div class="card-header">
          <h2>All Rankings</h2>
        </div>
        <div class="card-body" style="padding:0;overflow-x:auto;">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Score</th>
                <th>Tests</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>
  <script>
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('active');
      document.body.classList.add('sidebar-open');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
    }

    sidebarToggle.addEventListener('click', () => {
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    sidebarOverlay.addEventListener('click', closeSidebar);
  </script>
</body>
</html>
