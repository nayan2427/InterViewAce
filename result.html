<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Result - InterviewAce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body data-page="result">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <picture>
          <source srcset="images/logo.webp 1x, images/logo-2x.webp 2x" type="image/webp">
          <img src="images/logo.png" alt="InterviewAce" width="36" height="24">
        </picture>
        <span>InterviewAce</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="mcq.html"><span class="nav-icon">📝</span> MCQ Test</a>
        <a href="notes.html"><span class="nav-icon">📒</span> Notes</a>
        <a href="leaderboard.html"><span class="nav-icon">🏆</span> Leaderboard</a>
        <a href="profile.html"><span class="nav-icon">👤</span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button class="dark-mode-toggle btn btn-outline" style="width:100%">🌙 Dark</button>
        <button id="logoutBtn" class="btn btn-danger" style="width:100%">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="result-container">
        <header class="page-header" style="justify-content:center;">
          <div style="text-align:center;">
            <h1>Test Results</h1>
            <p>Here's how you performed</p>
          </div>
        </header>

        <article class="result-card">
          <div id="autoSubmitNotice" class="auto-submit-notice">
            ⏱️ Test was auto-submitted when the timer expired.
          </div>

          <div class="result-score-circle">
            <span id="resultPercentage" class="score-value">0%</span>
            <span class="score-total"><span id="resultScore">0</span>/<span id="resultTotal">50</span></span>
          </div>

          <div id="performanceMessage" class="performance-badge good">Good</div>

          <p>Time taken: <strong id="timeTaken">0m 0s</strong></p>

          <div class="result-stats">
            <div class="result-stat correct">
              <div id="resultCorrect" class="value">0</div>
              <div class="label">Correct</div>
            </div>
            <div class="result-stat wrong">
              <div id="resultWrong" class="value">0</div>
              <div class="label">Wrong</div>
            </div>
            <div class="result-stat">
              <div id="resultUnanswered" class="value">0</div>
              <div class="label">Unanswered</div>
            </div>
            <div class="result-stat">
              <div id="resultPercentage2" class="value" style="color:var(--primary)">-</div>
              <div class="label">Accuracy</div>
            </div>
          </div>
        </article>

        <div class="result-actions">
          <a href="mcq.html" class="btn btn-primary">Retake Test</a>
          <a href="dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
          <a href="leaderboard.html" class="btn btn-outline">View Leaderboard</a>
        </div>
      </div>
    </main>
  </div>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pct = document.getElementById('resultPercentage').textContent;
      const pct2 = document.getElementById('resultPercentage2');
      if (pct2) pct2.textContent = pct;
    });

    // Sidebar toggle
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('active');
      document.body.classList.add('sidebar-open');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
    }

    sidebarToggle.addEventListener('click', () => {
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    sidebarOverlay.addEventListener('click', closeSidebar);
  </script>
</body>
</html>
