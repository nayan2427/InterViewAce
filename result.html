<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Result - InterviewAce</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body data-page="result">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="images/logo.png" alt="InterviewAce">
        <span>InterviewAce</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="mcq.html"><span class="nav-icon">📝</span> MCQ Test</a>
        <a href="notes.html"><span class="nav-icon">📒</span> Notes</a>
        <a href="leaderboard.html"><span class="nav-icon">🏆</span> Leaderboard</a>
        <a href="profile.html"><span class="nav-icon">👤</span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button class="dark-mode-toggle btn btn-outline" style="width:100%">🌙 Dark</button>
        <button id="logoutBtn" class="btn btn-danger" style="width:100%">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="result-container">
        <header class="page-header" style="justify-content:center;">
          <div style="text-align:center;">
            <h1>Test Results</h1>
            <p>Here's how you performed</p>
          </div>
        </header>

        <article class="result-card">
          <div id="autoSubmitNotice" class="auto-submit-notice">
            ⏱️ Test was auto-submitted when the timer expired.
          </div>

          <div class="result-score-circle">
            <span id="resultPercentage" class="score-value">0%</span>
            <span class="score-total"><span id="resultScore">0</span>/<span id="resultTotal">50</span></span>
          </div>

          <div id="performanceMessage" class="performance-badge good">Good</div>

          <p>Time taken: <strong id="timeTaken">0m 0s</strong></p>

          <div class="result-stats">
            <div class="result-stat correct">
              <div id="resultCorrect" class="value">0</div>
              <div class="label">Correct</div>
            </div>
            <div class="result-stat wrong">
              <div id="resultWrong" class="value">0</div>
              <div class="label">Wrong</div>
            </div>
            <div class="result-stat">
              <div id="resultUnanswered" class="value">0</div>
              <div class="label">Unanswered</div>
            </div>
            <div class="result-stat">
              <div id="resultPercentage2" class="value" style="color:var(--primary)">-</div>
              <div class="label">Accuracy</div>
            </div>
          </div>
        </article>

        <div class="result-actions">
          <a href="mcq.html" class="btn btn-primary">Retake Test</a>
          <a href="dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
          <a href="leaderboard.html" class="btn btn-outline">View Leaderboard</a>
        </div>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pct = document.getElementById('resultPercentage').textContent;
      const pct2 = document.getElementById('resultPercentage2');
      if (pct2) pct2.textContent = pct;
    });
  </script>
</body>
</html>
