<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - InterviewAce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page" data-auth-page="login">
  <div class="auth-container">
    <!-- Visual Panel -->
    <aside class="auth-visual">
      <picture>
        <source srcset="images/logo.webp 1x, images/logo-2x.webp 2x" type="image/webp">
        <img src="images/logo.png" alt="InterviewAce" width="80" height="53">
      </picture>
      <h2>Welcome Back!</h2>
      <p>Continue your interview preparation journey and track your progress.</p>
      <ul>
        <li>Resume your practice tests</li>
        <li>View performance analytics</li>
        <li>Access your saved notes</li>
        <li>Check leaderboard rank</li>
      </ul>
    </aside>

    <!-- Login Form -->
    <section class="auth-form-section">
      <div class="auth-top-bar">
        <button class="dark-mode-toggle" aria-label="Toggle dark mode">
          <span class="toggle-icon">🌙</span> Dark
        </button>
      </div>

      <a href="index.html" class="back-home">← Back to Home</a>

      <div class="auth-header">
        <h1>Login</h1>
        <p>Enter your credentials to continue</p>
      </div>

      <div id="formMessage" class="form-message"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
          <span id="emailError" class="error-text"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
          <span id="passwordError" class="error-text"></span>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </p>
    </section>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
